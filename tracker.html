<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Tracker Issue</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
        <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&family=Merriweather:ital,opsz,wght@0,18..144,300..900;1,18..144,300..900&display=swap" rel="stylesheet">
<style>
    .geist{
  font-family: "Geist", sans-serif;

}

</style>
</head>

<body class="geist bg-gray-100">
    <header>
        <nav class="bg-white shadow-sm max-[510px]:p-2">
            <div class="max-w-7xl mx-auto px-4 max-[510px]:px-2 ">
                <div class="flex justify-between h-16 max-[510px]:h-32 items-center max-[510px]:flex-col">


                    <div class=" flex items-center">
                        <img class="h-8 w-8" src="assets/github-logo.png" alt="GitHub Logo">
                        <span class="ml-2  font-semibold text-gray-800 text-lg">GitHub Issues Tracker</span>
                    </div>






                    <div class="flex gap-2 max-[510px]:flex-col max-[510px]:gap-1">
                        <div class="relative max-[510px]:my-1">
                            <span class="absolute inset-y-0 left-3 flex items-center text-gray-400">
                                <svg class="h-4 w-4" fill="currentColor" viewBox="0 0 20 20">
                                    <path fill-rule="evenodd"
                                        d="M12.9 14.32a8 8 0 111.414-1.414l4.387 4.387a1 1 0 01-1.414 1.414l-4.387-4.387zM14 8a6 6 0 11-12 0 6 6 0 0112 0z"
                                        clip-rule="evenodd" />
                                </svg>
                            </span>
                            <input id="search-in" type="text" placeholder="Search issues.."
                                class="pl-9 pr-4 py-2 max-[510px]:py-1 border border-gray-400 rounded-md w-64">
                        </div>


                        <button id="search-btn"
                            class="bg-purple-800 text-white px-4 max-[510px]:px-2 py-2 max-[510px]:py-1 rounded-md hover:bg-purple-700 font-medium flex items-center space-x-1">
                            <i class="fa-solid fa-plus"></i>
                            <span>Search</span>
                        </button>
                    </div>

                </div>


            </div>

        </nav>
    </header>
    <main class="max-w-11/12 mx-auto">
        <div class="bg-white p-4 max-[510px]:p-2 mt-10 max-[510px]:mt-6 rounded-lg max-[510px]:text-center">
            <button onclick="loadData()" id="all" class="btn btn-outline border-gray-400 text-gray-400 mr-2 max-[510px]:mr-0">&nbsp;&nbsp;&nbsp;&nbsp;All
                &nbsp;&nbsp;</button>
            <button id="open" class="btn btn-outline border border-gray-400 text-gray-400 mr-2 max-[510px]:mr-0 ">&nbsp;Open&nbsp;</button>
            <button id="closed" class="btn btn-outline border-gray-400 text-gray-400 ">Closed</button>
        </div>
        <div class="flex justify-between max-[510px]:flex-col max-[510px]:gap-1 items-center mt-5 max-[510px]:mt-3 p-4 max-[510px]:p-2 bg-white rounded-t-lg shadow-sm">
            <div class="flex justify-center items-center gap-2">
                <div class="rounded-full bg-gray-300 p-2">
                    <img src="assets/Aperture.png" alt="">
                </div>
                <div>
                    <p id="allIssu" class="font-semibold">50 Issues</p>
                    <p class="text-gray-400">Track and manage your project issues</p>
                </div>
            </div>
            <div class="flex justify-center max-[510px]:justify-start items-center gap-4">
                <div id="green" class="flex justify-center items-center gap-2">
                    <i class="fa-solid fa-circle text-green-500"></i>
                    <p>Open</p>
                </div>
                <div id="purple" class="flex justify-center items-center gap-2">
                    <i class="fa-solid fa-circle text-purple-800"></i>
                    <p>Closed</p>
                </div>
            </div>

        </div>
        <section id="spin" class="flex justify-center items-center py-8 max-[510px]:py-6 hidden">
            <span class="loading loading-bars loading-xl"></span>
        </section>
        <div class="bg-gray-100 my-1 shadow-sm grid grid-cols-4 max-[510px]:grid-cols-1 p-6 max-[510px]:p-4" id="card-container">
            <div>
                <div class="bg-white  p-2 max-[510px]:p-1 space-y-2 border-t-4 border-green-500 rounded-lg " id="card">
                    <div class="flex justify-between items-center">
                        <img src="assets/Open-Status.png" alt="">
                        <div class="bg-red-100 rounded-full p-2 max-[510px]:p-1">
                            <p class="text-red-500">HIGH</p>
                        </div>
                    </div>
                 
                        <p>
                           
                        </p>
                    <div class="flex gap-3">
                        <div class="bg-red-100 border border-red-500 p-2 rounded-full text-red-500">
                            <button><i class="fa-solid fa-bug"></i> &nbsp;BUG</button>
                        </div>
                        <div class="bg-yellow-100 border border-yellow-500 p-2 rounded-full text-yellow-500">
                            <button> <i class="fa-solid fa-life-ring"></i>&nbsp;HELP WANTED </button>
                        </div>

                    </div>


                </div>
                <div class="my-1 bg-white p-2">
                    <p class="text-gray-400">#1
                        by john_doe</p>
                    <p class="text-gray-400">1/15/2024</p>
                </div>
            </div>

        </div>

        <!-- Open the modal using ID.showModal() method -->
<!-- <button class="btn" onclick="my_modal_1.showModal()">open modal</button> -->

<dialog id="my_modal_1" class="modal">
  <div class="modal-box">
    <div id="detail-container" class="">

    </div>
   
    <div class="modal-action">
      <form method="dialog">
        <!-- if there is a button in form, it will close the modal -->
        <button class="btn bg-purple-800 text-white">Close</button>
      </form>
    </div>
  </div>
</dialog>



    </main>
    
    <script src="tracker.js"></script>

</body>

</html>
