<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Tracker Issue</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>

<body class="bg-gray-100 h-screen">
    <header>
        <nav class="bg-white shadow-sm">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                <div class="flex justify-between h-16 items-center">


                    <div class=" flex items-center">
                        <img class="h-8 w-8" src="assets/github-logo.png" alt="GitHub Logo">
                        <span class="ml-2 font-semibold text-gray-800 text-lg">GitHub Issues Tracker</span>
                    </div>






                    <div class="flex gap-2"> <div class="relative">
                        <span class="absolute inset-y-0 left-3 flex items-center text-gray-400">
                            <svg class="h-4 w-4" fill="currentColor" viewBox="0 0 20 20">
                                <path fill-rule="evenodd"
                                    d="M12.9 14.32a8 8 0 111.414-1.414l4.387 4.387a1 1 0 01-1.414 1.414l-4.387-4.387zM14 8a6 6 0 11-12 0 6 6 0 0112 0z"
                                    clip-rule="evenodd" />
                            </svg>
                        </span>
                        <input type="text" placeholder="Search issues.."
                            class="pl-9 pr-4 py-2 border border-gray-400 rounded-md w-64">
                    </div>


                    <button
                        class="bg-purple-800 text-white px-4 py-2 rounded-md hover:bg-purple-700 font-medium flex items-center space-x-1">
                        <i class="fa-solid fa-plus"></i>
                        <span>New Issue</span>
                    </button></div>

                </div>


            </div>
            
        </nav>
    </header>
    <main class="max-w-11/12 mx-auto">
        <div class="bg-white p-4 mt-10 rounded-b-lg">
             <button class="btn btn-outline border-gray-400 text-gray-400 mr-2">&nbsp;&nbsp;&nbsp;&nbsp;All  &nbsp;&nbsp;</button>
<button class="btn btn-outline border border-gray-400 text-gray-400 mr-2 ">&nbsp;Open&nbsp;</button>
<button class="btn btn-outline border-gray-400 text-gray-400 ">Closed</button>
        </div>
       


    </main>

</body>

</html>
